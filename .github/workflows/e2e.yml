name: Playwright E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        project:
          - mobile-iphone
          - mobile-small
          - tablet-ipad
          - tablet-landscape
    env:
      # Optional: provide a pre-minted Supabase session to exercise authenticated
      # dashboards. When missing, the suite gracefully skips auth-only specs.
      E2E_SUPABASE_SESSION_JSON: ${{ secrets.E2E_SUPABASE_SESSION_JSON }}
      E2E_SUPABASE_STORAGE_KEY: ${{ secrets.E2E_SUPABASE_STORAGE_KEY }}
      E2E_BASE_URL: http://127.0.0.1:8080
      # Skip Playwright's auto-spawned webServer — we start `vite preview` below.
      E2E_NO_SERVER: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Build app
        run: bun run build

      - name: Start preview server
        run: |
          bun run preview --port 8080 --host 127.0.0.1 &
          npx --yes wait-on http://127.0.0.1:8080 -t 60000

      - name: Run Playwright (${{ matrix.project }})
        run: bunx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          # Longer retention on main so post-release debugging is possible.
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 14 }}

      - name: Upload Playwright traces & videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 14 }}

  # Dedicated authenticated dashboard smoke. Runs only when the Supabase session
  # secret is configured at the repo level. Other PRs / forks skip cleanly.
  dashboard-smoke:
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    timeout-minutes: 15
    env:
      E2E_SUPABASE_SESSION_JSON: ${{ secrets.E2E_SUPABASE_SESSION_JSON }}
      E2E_SUPABASE_STORAGE_KEY: ${{ secrets.E2E_SUPABASE_STORAGE_KEY }}
      E2E_BASE_URL: http://127.0.0.1:8080
      E2E_NO_SERVER: '1'
    steps:
      - name: Skip when no session secret is set
        if: ${{ env.E2E_SUPABASE_SESSION_JSON == '' || env.E2E_SUPABASE_STORAGE_KEY == '' }}
        run: |
          echo "::notice::E2E_SUPABASE_SESSION_JSON / E2E_SUPABASE_STORAGE_KEY not configured — skipping authenticated dashboard smoke."
          exit 0

      - uses: actions/checkout@v4
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
      - uses: oven-sh/setup-bun@v2
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        with:
          bun-version: latest

      - name: Install dependencies
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        run: bunx playwright install --with-deps chromium

      - name: Build app
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        run: bun run build

      - name: Start preview server
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        run: |
          bun run preview --port 8080 --host 127.0.0.1 &
          npx --yes wait-on http://127.0.0.1:8080 -t 60000

      - name: Run dashboard smoke
        if: ${{ env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        run: bunx playwright test tests/e2e/dashboard-layout.spec.ts --project=mobile-iphone

      - name: Upload smoke report
        if: ${{ always() && env.E2E_SUPABASE_SESSION_JSON != '' && env.E2E_SUPABASE_STORAGE_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-smoke-report
          path: |
            playwright-report
            test-results
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 14 }}
