name: Chromatic Visual Regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic needs full git history to compute baseline diffs.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Story files declare the mobile/tablet viewports
          # (360/390/414/768/820/1024) via parameters.chromatic.viewports.
          exitOnceUploaded: true
          onlyChanged: true
          buildScriptName: build-storybook
