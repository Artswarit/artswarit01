name: Chromatic Visual Regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip cleanly when the project token is missing so forks don't get red checks.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic needs full git history to compute baseline diffs.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Fail the build when stories drift from the accepted baseline.
          # Story files declare the mobile/tablet viewports
          # (360/390/414/768/820/1024) via parameters.chromatic.viewports.
          exitZeroOnChanges: false
          exitOnceUploaded: false
          onlyChanged: true
          buildScriptName: build-storybook
