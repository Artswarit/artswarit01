      <style>
        .boot-loader {
          min-height: 100vh;
          min-height: 100dvh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: hsl(220 70% 98%);
          color: hsl(220 10% 10%);
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .boot-loader__content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 14px;
        }
        .boot-loader__mark {
          width: 76px;
          height: 76px;
          border-radius: 999px;
          display: grid;
          place-items: center;
          position: relative;
        }
        .boot-loader__mark::before {
          content: "";
          position: absolute;
          inset: 0;
          border-radius: inherit;
          border: 2px solid hsl(250 70% 60% / 0.18);
          border-top-color: hsl(250 70% 60%);
          animation: boot-spin 1.15s linear infinite;
        }
        .boot-loader__mark img {
          width: 46px;
          height: 46px;
          object-fit: contain;
        }
        .boot-loader__text {
          margin: 0;
          font-size: 11px;
          font-weight: 800;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: hsl(220 10% 40%);
        }
        @keyframes boot-spin { to { transform: rotate(360deg); } }
      </style>
      <div class="boot-loader" role="status" aria-live="polite" aria-label="Loading Artswarit">

    <script>
      window.addEventListener("error", (event) => {
        if (/Loading chunk|Failed to fetch dynamically imported module|Importing a module script failed/i.test(String(event.message || ""))) {
          const key = "__artswarit_chunk_reload_at";
          const last = Number(sessionStorage.getItem(key) || 0);
          if (Date.now() - last > 10000) {
            sessionStorage.setItem(key, String(Date.now()));
            window.location.reload();
          }
        }
      });
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        const host = window.location.hostname;
        const isLocal = host === "localhost" || host === "127.0.0.1";
        const isLovablePreview = host.includes("lovable.app") && (host.includes("preview") || host.includes("id-preview"));

        if (isLocal || isLovablePreview) {
          navigator.serviceWorker.getRegistrations?.().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          }).catch(() => {});
          caches?.keys?.().then((keys) => keys.forEach((key) => caches.delete(key))).catch(() => {});
        } else {
          window.addEventListener("load", () => {
            navigator.serviceWorker.register("/sw.js").catch(() => {});
          });
        }
      }
    </script>
